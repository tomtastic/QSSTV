---
name: build-on-macOS-26
permissions:
  contents: read

on:
  push:
  pull_request:
  merge_group:
  workflow_call:
  workflow_dispatch:

jobs:
  macos_build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v3
      
      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/fftw
            /usr/local/Cellar/hamlib
            /usr/local/Cellar/openjpeg
            /usr/local/Cellar/qt
            /usr/local/Cellar/pulseaudio
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/macos-26.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-
      
      - name: Install Homebrew dependencies
        run: |
          env HOMEBREW_NO_AUTO_UPDATE=1 brew install fftw hamlib openjpeg qt pulseaudio

      - name: Run CMake
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu)
          cd src
          zip -9 -r qsstv_arm64.app.zip qsstv.app

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: qsstv_arm64.app.zip
          path: |
            build/src/qsstv_arm64.app.zip
          if-no-files-found: error
